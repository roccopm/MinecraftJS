name: Feature Request
description: Suggest a new feature or improvement
title: "[FEATURE] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Please describe the feature or improvement below.
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What would you like to see?
      placeholder: Describe the feature in detail...
    validations:
      required: true
