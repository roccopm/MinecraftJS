<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Minecraft JS</title>
        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="menu.css" />
        <link rel="icon" href="Assets/sprites/misc/icon_16x16.png" />
    </head>
    <body oncontextmenu="return false;">
        <div class="chromium-issue-1092080-workaround__wrapper">
            <canvas id="canvas"></canvas>
            <div class="chromium-issue-1092080-workaround__overlay"></div>

            <div id="pause-menu">
                <div class="pause-menu-page" data-page="1">
                    <h2
                        class="input-field-title pause-menu-title"
                        style="
                            margin-top: -2rem;
                            margin-bottom: 2rem;
                            font-size: xx-large;
                        "
                    >
                        Game Menu
                    </h2>
                    <button class="btn" onclick="pauseMenu.close()">
                        Back to Game
                    </button>
                    <button class="btn" onclick="pauseMenu.setPage(2)">
                        Debug Menu
                    </button>
                    <!-- These will be uncommented when advancements are added -->
                    <!-- <div>
                        <button class="btn">Advancements</button>
                        <button class="btn">Statistics</button>
                    </div> -->
                    <a
                        class="btn"
                        href="https://github.com/plekiko/MinecraftJS/issues/new"
                        target="_blank"
                        >Report Bugs</a
                    >
                    <button
                        class="btn"
                        onclick="if(typeof SaveWorld==='function')SaveWorld(false);window.location.href='index.html'"
                    >
                        Save and Quit to Title
                    </button>
                </div>

                <div class="pause-menu-page" data-page="2">
                    <h2 class="input-field-title pause-menu-title">Debug Menu</h2>
                    <button class="btn" onclick="pauseMenu.setPage(1)">Back</button>
                    <button class="btn" onclick="if(typeof SaveWorld==='function')SaveWorld()">Save World</button>
                    <button class="btn" onclick="if(typeof SaveWorld==='function')SaveWorld(false, true)">Save World File</button>
                    <button class="btn" id="debug-chunk-borders" onclick="toggleChunkBorders()">Chunk Borders</button>
                    <button class="btn" id="debug-camera" onclick="toggleCamera()">Camera</button>
                    <button class="btn" id="debug-hitbox" onclick="toggleHitbox()">Hitbox</button>
                    <button class="btn" id="debug-print-block" onclick="togglePrintBlock()">Print Block</button>
                    <button class="btn" id="debug-file-size" onclick="toggleFileSize()">File Size</button>
                    <button class="btn" id="debug-fps" onclick="toggleFps()">FPS</button>
                    <button class="btn" id="debug-coords" onclick="toggleCoordinates()">Coords</button>
                </div>
            </div>
        </div>
